<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmiSmart — Work in Progress | Amruta J</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Your uploaded condensed cut — takes priority if it loads correctly */
  @font-face{
    font-family:'Bricolage Grotesque Condensed';
    src: url('BricolageGrotesque48ptCondensed-SemiBold.ttf') format('truetype');
    font-weight:600;
    font-style:normal;
    font-display:swap;
  }

  :root{
    /* ---- Colors (design system) ---- */
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-2: #F1F0EE;
    --heading: #1D1D1D;
    --body-text: #4A4948;
    --text-faint: #8C8B89;
    --coral: #FF5C4D;
    --coral-dim: rgba(255,92,77,0.12);
    --line: rgba(29,29,29,0.09);

    /* ---- Fonts ---- */
    --font-heading: 'Bricolage Grotesque Condensed', 'Bricolage Grotesque', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;

    /* ---- Type scale ---- */
    --h1: 56px;
    --h2: 42px;
    --h3: 30px;
    --h4: 24px;
    --h5: 18px;
    --p1: 22px;
    --p2: 16px;
    --p3: 14px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--body-text);
    font-family:var(--font-body);
    font-size:var(--p2);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    cursor: url('coffee-cursor.svg') 4 12, auto;
  }
  a, button, [role="button"], input, textarea, select, label{
    cursor: url('coffee-cursor.svg') 4 12, pointer;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--coral); color:#fff;}
  :focus-visible{ outline:2px solid var(--coral); outline-offset:3px; }

  h1,h2,h3,h4,h5{
    font-family:var(--font-heading);
    font-weight:600;
    color:var(--heading);
    letter-spacing:0.01em;
    line-height:1.15;
  }
  .h1{ font-size:var(--h1); }
  .h2{ font-size:var(--h2); }
  .h3{ font-size:var(--h3); }
  .h4{ font-size:var(--h4); }
  .h5{ font-size:var(--h5); font-weight:600; }

  .p1{ font-size:var(--p1); }
  .p2{ font-size:var(--p2); }
  .p3{ font-size:var(--p3); }

  /* ---------- Top nav ---------- */
  .topnav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 3.5rem 8vw 0;
  }
  .logo-text{
    font-family:var(--font-heading);
    font-size:var(--h3);
    font-weight:600;
    color:var(--coral);
    letter-spacing:0.01em;
  }
  .topnav nav a{
    font-family:var(--font-body);
    font-size:var(--p2); font-weight:500; color:var(--heading);
    padding-bottom:2px; border-bottom:1px solid transparent;
    transition:border-color 0.2s ease;
  }
  .topnav nav a:hover{ border-color:var(--coral); color:var(--coral); }

  /* ---------- Hero ---------- */
  .hero{
    padding: 6rem 8vw 2rem;
    max-width:1280px;
  }
  .eyebrow{
    font-family:var(--font-body);
    font-size:var(--p1);
    font-weight:600;
    color:var(--coral);
    margin-bottom:0.6rem;
  }
  h1.headline{
    max-width:24ch;
    font-size:clamp(2.1rem, 4.6vw, var(--h1));
    letter-spacing:0.010em;
  }
  h1.headline .headline-sub{
    display:block;
    font-family:var(--font-body);
    font-weight:600;
    font-size:clamp(1.15rem, 2.4vw, 1.75rem);
    letter-spacing:0.005em;
    color:var(--body-text);
    margin-top:0.9rem;
  }
  .hero-cta{
    margin-top:2.8rem;
    display:inline-flex; align-items:center; gap:1rem;
    font-family:var(--font-body);
    font-size:var(--p1); font-weight:500;
    color:var(--heading);
    cursor:pointer;
  }
  .hero-cta .dot{
    width:40px; height:40px; border-radius:50%;
    background:var(--coral);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    transition:transform 0.25s ease;
  }
  .hero-cta:hover .dot{ transform:translateX(4px); }

  /* ---------- Client logos row ---------- */
  .clients{
    padding: 1.5rem 8vw 4rem;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:3.2rem 4.5rem;
    border-bottom:1px solid var(--line);
  }
  .client-card{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .clients img{
    height:150px;
    width:150px;
    max-width:150px;
    object-fit:contain;
    opacity:0.75;
    filter:grayscale(100%);
    transition:opacity 0.25s ease, filter 0.25s ease;
  }
  .clients img:hover{ opacity:1; filter:grayscale(0%); }

  /* ---------- Main layout (timeline) ---------- */
  main{
    display:grid;
    grid-template-columns: 200px 1fr;
    max-width:1280px;
    margin:0 auto;
    padding: 0 8vw;
  }

  nav.ruler{
    position:sticky; top:0; align-self:start; height:100vh;
    display:flex; flex-direction:column; justify-content:center;
    padding-right:2rem;
  }
  .ruler-track{ position:relative; display:flex; flex-direction:column; gap:0; }
  .ruler-line{
    position:absolute; left:5px; top:6px; bottom:6px; width:1px;
    background:var(--line);
  }
  .ruler-fill{
    position:absolute; left:5px; top:6px; width:1px;
    background:var(--coral);
    height:0%;
    transition:height 0.15s linear;
  }
  .ruler-item{
    display:flex; align-items:center; gap:0.9rem;
    padding:1.15rem 0; cursor:pointer; position:relative; z-index:2;
  }
  .ruler-dot{
    width:11px; height:11px; border-radius:50%;
    background:var(--surface);
    border:1px solid var(--text-faint);
    flex-shrink:0;
    transition:all 0.35s cubic-bezier(.4,0,.2,1);
  }
  .ruler-year{
    font-family:var(--font-body); font-size:var(--p3); color:var(--text-faint);
    transition:all 0.35s cubic-bezier(.4,0,.2,1);
    letter-spacing:0.02em;
  }
  .ruler-item.active .ruler-dot{
    background:var(--coral); border-color:var(--coral);
    box-shadow:0 0 0 5px var(--coral-dim);
    transform:scale(1.25);
  }
  .ruler-item.active .ruler-year{
    color:var(--heading); font-weight:600; font-size:var(--p2);
  }

  section.era-heading{ padding: 3.5rem 0 1.5rem; max-width:60ch; }
  section.era-heading h2{ font-size:var(--h3); margin-bottom:0.7rem; }
  section.era-heading p{ font-family:var(--font-body); color:var(--body-text); font-size:var(--p2); }

  .project{
    padding: 2.4rem 1.75rem;
    margin: 0 -1.75rem;
    border-top:1px solid var(--line);
    border-radius:16px;
    display:grid;
    grid-template-columns: 1fr 1.15fr;
    gap:3rem;
    align-items:center;
    opacity:0;
    transform:translateY(28px);
    cursor:pointer;
    position:relative;
    border:1px solid transparent;
    transition:opacity 0.7s ease, transform 0.7s ease, background-color 0.3s ease;
  }
  .project.visible{ opacity:1; transform:translateY(0); }
  .project:hover{
    background:var(--surface-2);
  }
  .project:hover .project-visual{
    border-color:rgba(29,29,29,0.14);
  }
  .project-visual{
    aspect-ratio: 4/3; border-radius:8px; overflow:hidden;
    background:var(--surface-2); border:1px solid var(--line);
    transition:border-color 0.3s ease;
  }
  .project-visual svg{ width:100%; height:100%; display:block; }
  .project-visual img{ width:100%; height:100%; object-fit:cover; display:block; }

  .project-info .tag-row{ display:flex; align-items:center; gap:0.8rem; margin-bottom:1rem; }
  .tag{
    font-family:var(--font-body); font-size:var(--p3); text-transform:uppercase;
    letter-spacing:0.08em; padding:0.3rem 0.6rem; border-radius:3px;
    border:1px solid var(--coral); color:var(--coral);
  }
  .project-year{ font-family:var(--font-body); color:var(--text-faint); font-size:var(--p3); }
  .project-info h3{ font-size:var(--h4); margin-bottom:0.8rem; }
  .project-info p.desc{ font-family:var(--font-body); color:var(--body-text); font-size:var(--p2); max-width:48ch; margin-bottom:1.3rem; }
  .skill-chips{ display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:0; }

  /* ---------- Paired cards (two case studies under one year) ---------- */
  .project.pair{ display:block; cursor:default; }
  .project.pair:hover{ background:transparent; }
  .pair-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:2.4rem;
  }
  .pair-card{ display:flex; flex-direction:column; }
  .pair-card .pair-visual{
    aspect-ratio: 4/3; border-radius:8px; overflow:hidden;
    background:var(--surface-2); border:1px solid var(--line);
    margin-bottom:1.4rem;
  }
  .pair-card .pair-visual img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pair-card .tag-row{ display:flex; align-items:center; gap:0.8rem; margin-bottom:1rem; }
  .pair-card h3{ font-size:var(--h4); margin-bottom:0.8rem; }
  .pair-card p.desc{ font-family:var(--font-body); color:var(--body-text); font-size:var(--p2); max-width:48ch; margin-bottom:1.3rem; }
  @media (max-width: 860px){
    .pair-grid{ grid-template-columns:1fr; gap:2.2rem; }
  }
  .chip{
    font-family:var(--font-body); font-size:var(--p3); color:var(--body-text); background:var(--surface);
    border:1px solid var(--line); padding:0.3rem 0.7rem; border-radius:20px;
  }


  /* ---------- Side projects ---------- */
  .side-projects{
    max-width:1280px; margin:0 auto;
    padding:5rem 8vw 6rem;
  }
  .side-projects .tag-label{
    display:inline-block;
    font-family:var(--font-body); font-weight:600;
    font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--coral);
    margin-bottom:1rem;
  }
  .side-projects h2{ font-size:var(--h3); max-width:36ch; margin-bottom:0.9rem; }
  .side-projects p.desc{
    font-family:var(--font-body); color:var(--body-text); font-size:var(--p2);
    max-width:58ch; margin-bottom:2.4rem; line-height:1.7;
  }
  .side-project-frame{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--surface-2);
    box-shadow:0 24px 60px -24px rgba(29,29,29,0.16);
  }
  .side-project-frame iframe{
    width:100%; height:420px; border:none; display:block;
  }
  .side-project-link{
    display:inline-flex; align-items:center; gap:0.5rem;
    margin-top:1.5rem;
    font-family:var(--font-body); font-size:var(--p3); font-weight:500;
    color:var(--heading);
    border-bottom:1px solid transparent;
    transition:border-color 0.2s ease, color 0.2s ease;
  }
  .side-project-link:hover{ color:var(--coral); border-color:var(--coral); }
  .side-project-link svg{ transition:transform 0.2s ease; }
  .side-project-link:hover svg{ transform:translate(2px,-2px); }

  /* ---------- Testimonials (3-card) ---------- */
  .testimonials{
    position:relative;
    background:var(--bg);
    padding:8rem 8vw 4rem;
    border-top:1px solid var(--line);
    overflow:hidden;
  }
  .testi-row{
    position:relative; z-index:1;
    max-width:1140px; margin:0 auto;
    display:flex; align-items:center; justify-content:center;
    gap:1.6rem;
  }
  .testi-card-shell{
    border-radius:26px;
    background:var(--surface);
    border:1px solid var(--line);
    box-shadow:0 24px 60px -20px rgba(29,29,29,0.10);
    transition:filter 0.6s ease, opacity 0.6s ease, transform 0.6s ease, flex-basis 0.6s ease;
  }
  .testi-card-shell.active{
    position:relative;
    flex:0 0 42%;
    max-width:560px;
    padding:3.4rem 3rem;
    filter:blur(0);
    opacity:1;
    transform:scale(1);
    z-index:2;
  }
  .testi-card-shell.side{
    flex:0 0 24%;
    max-width:250px;
    padding:2rem 1.6rem;
    filter:blur(3px);
    opacity:0.5;
    transform:scale(0.88);
    cursor:pointer;
  }
  .testi-card-shell.side:hover{ filter:blur(1.5px); opacity:0.75; }
  .testi-card-shell.side .testi-quote-mark{ font-size:1.5rem; margin-bottom:0.3rem; }
  .testi-card-shell.side .testi-quote{
    font-size:0.85rem; line-height:1.55;
    display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
  }
  .testi-card-shell.side .testi-meta{ margin-top:1.2rem; }
  .testi-card-shell.side .testi-avatar{ width:30px; height:30px; font-size:8px; margin-bottom:0.5rem; }
  .testi-card-shell.side .testi-name{ font-size:11px; }
  .testi-card-shell.side .testi-role{ font-size:8.5px; }

  .testi-quote-mark{
    display:block;
    font-family:Georgia, 'Times New Roman', serif;
    line-height:1;
    color:var(--coral);
    opacity:0.55;
    font-weight:400;
    font-size:2.2rem;
    margin-bottom:0.6rem;
  }
  .testi-quote{
    font-family:var(--font-body);
    font-weight:400;
    font-size:clamp(1.1rem, 1.7vw, 1.32rem);
    line-height:1.65;
    letter-spacing:0.002em;
    color:var(--heading);
    text-align:center;
  }
  .testi-meta{
    margin-top:2rem;
    display:flex; flex-direction:column; align-items:center;
  }
  .testi-avatar{
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-body); font-weight:600; font-size:10px;
    color:var(--heading);
    background:rgba(255,255,255,0.7);
    border:1px solid rgba(255,255,255,0.9);
    box-shadow:0 4px 10px rgba(29,29,29,0.06);
    margin-bottom:0.8rem;
  }
  .testi-name{ font-size:var(--p3); font-weight:600; color:var(--heading); letter-spacing:0.01em; text-align:center; }
  .testi-role{
    font-size:10px; font-weight:500; color:var(--text-faint);
    text-transform:uppercase; letter-spacing:0.09em;
    margin-top:0.3rem;
    text-align:center;
  }

  .testi-dots{ position:relative; z-index:1; display:flex; justify-content:center; gap:0.5rem; margin-top:2.8rem; }
  .testi-dot{
    width:6px; height:6px; border-radius:3px; padding:0;
    border:none; background:rgba(29,29,29,0.18); cursor:pointer;
    transition:all 0.35s ease;
  }
  .testi-dot.active{ background:var(--coral); width:18px; }

  footer{
    margin-top:0; padding: 3.5rem 8vw 3rem;
    display:flex; justify-content:space-between; align-items:flex-end;
    flex-wrap:wrap; gap:2rem;
    border-top:1px solid var(--line);
  }
  footer h2{ font-size:var(--h2); max-width:30ch; }
  footer .contact-links{ display:flex; flex-direction:column; align-items:flex-end; gap:1rem; font-family:var(--font-body); font-size:var(--p3); }
  footer .contact-email{ color:var(--coral); font-size:var(--p2); font-weight:500; }
  footer .contact-email:hover{ opacity:0.8; }
  footer .social-icons{ display:flex; align-items:center; gap:1.1rem; }
  footer .social-icons a{
    display:flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%;
    color:var(--heading);
    border:1px solid var(--line);
    transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  footer .social-icons a:hover{ background:var(--coral); border-color:var(--coral); color:#fff; }
  footer .foot-note{ width:100%; margin-top:3rem; font-family:var(--font-body); font-size:var(--p3); color:var(--text-faint); letter-spacing:0.02em; }

  @media (max-width: 860px){
    main{ grid-template-columns:1fr; padding:0 6vw; }
    nav.ruler{
      position:sticky; top:0; height:auto; flex-direction:row; padding:1rem 0;
      background:rgba(250,250,250,0.9); backdrop-filter:blur(8px);
      z-index:50; border-bottom:1px solid var(--line);
      justify-content:flex-start; overflow-x:auto;
    }
    .ruler-track{ flex-direction:row; gap:1.4rem; }
    .ruler-line, .ruler-fill{ display:none; }
    .ruler-item{ padding:0.3rem 0; flex-direction:column; gap:0.4rem; }
    .project{ grid-template-columns:1fr; gap:1.5rem; }
    .topnav{ padding:2rem 6vw 0; }
    .hero{ padding:4rem 6vw 3rem; }
    .clients{ padding:2.5rem 6vw 3.5rem; gap:2rem 2.5rem; }
    .clients img{ height:90px; width:90px; }
    .side-projects{ padding:3.5rem 6vw 4rem; }
    .side-project-frame iframe{ height:340px; }
    .testimonials{ padding:4.5rem 6vw; }
    .testi-card-shell.side{ display:none; }
    .testi-card-shell.active{ flex:1 1 100%; max-width:none; padding:2.4rem 1.8rem; border-radius:22px; }
    footer{ align-items:flex-start; }
    footer .contact-links{ align-items:flex-start; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; scroll-behavior:auto !important; }
  }

  /* ---------- Work-in-progress page ---------- */
  .wip-section{
    max-width:1100px;
    margin:0 auto;
    padding: 5rem 8vw 7rem;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .wip-tag{
    display:inline-block;
    font-family:var(--font-body); font-weight:600;
    font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--coral);
    margin-bottom:1.2rem;
  }
  .wip-heading{
    font-size:clamp(1.8rem, 4vw, var(--h2));
    max-width:20ch;
  }
  .wip-sub{
    font-family:var(--font-body); font-size:var(--p1); color:var(--body-text);
    margin-top:1rem; max-width:44ch;
  }
  .wip-image-frame{
    width:100%;
    max-width:900px;
    margin:0 auto;
    border-radius:20px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--surface-2);
    box-shadow:0 24px 60px -24px rgba(29,29,29,0.16);
  }
  .wip-image-frame img{
    width:100%; height:auto; object-fit:contain; display:block;
  }
  .wip-footnote{
    font-family:var(--font-body); font-size:var(--p3); color:var(--text-faint);
    margin-top:0.5rem;
  }
  .wip-back{
    margin-top:2.6rem;
    display:inline-flex; align-items:center; gap:0.6rem;
    font-family:var(--font-body); font-size:var(--p2); font-weight:500;
    color:var(--heading);
    border-bottom:1px solid transparent;
    transition:border-color 0.2s ease, color 0.2s ease;
  }
  .wip-back:hover{ color:var(--coral); border-color:var(--coral); }
  .wip-back svg{ transition:transform 0.2s ease; }
  .wip-back:hover svg{ transform:translateX(-3px); }

  @media (max-width: 860px){
    .wip-section{ padding: 3.5rem 6vw 5rem; }
  }
</style>
</head>
<body>

<div class="topnav">
  <div class="logo-text">Amruta J</div>
  <nav><a href="about.html">About Me</a></nav>
</div>

<section class="wip-section">
  <div class="wip-image-frame">
    <img src="https://raw.githubusercontent.com/amything/my-portfolio/main/WIP.png" alt="Work in progress">
  </div>

  <a class="wip-back" href="index.html">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12L11 6M5 12L11 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to selected work
  </a>
</section>

<footer id="contact">
  <h2>From concept to creation,<br>let's make it happen</h2>
  <div class="contact-links">
    <a class="contact-email" href="mailto:amruta.inbox@gmail.com">amruta.inbox@gmail.com</a>
    <div class="social-icons">
      <a href="mailto:amruta.inbox@gmail.com" aria-label="Email">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 5h18v14H3V5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M3 6l9 7 9-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
