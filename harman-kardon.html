<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harman Kardon — Amruta J</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Bricolage Grotesque Condensed';
    src: url('BricolageGrotesque48ptCondensed-SemiBold.ttf') format('truetype');
    font-weight:600;
    font-style:normal;
    font-display:swap;
  }

  :root{
    /* ---- Colors (design system) ---- */
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-2: #F1F0EE;
    --heading: #1D1D1D;
    --body-text: #4A4948;
    --text-faint: #8C8B89;
    --coral: #FF5C4D;
    --coral-dim: rgba(255,92,77,0.12);
    --line: rgba(29,29,29,0.09);

    /* ---- Fonts ---- */
    --font-heading: 'Bricolage Grotesque Condensed', 'Bricolage Grotesque', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;

    /* ---- Type scale ---- */
    --h1: 56px;
    --h2: 42px;
    --h3: 30px;
    --h4: 24px;
    --h5: 18px;
    --p1: 22px;
    --p2: 16px;
    --p3: 14px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--body-text);
    font-family:var(--font-body);
    font-size:var(--p2);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--coral); color:#fff;}
  :focus-visible{ outline:2px solid var(--coral); outline-offset:3px; }

  h1,h2,h3,h4,h5{
    font-family:var(--font-heading);
    font-weight:600;
    color:var(--heading);
    letter-spacing:0.01em;
    line-height:1.15;
  }

  img{ display:block; max-width:100%; }

  /* ---------- Top nav ---------- */
  .topnav{
    display:flex; align-items:center; justify-content:space-between;
    padding: 3.5rem 8vw 0;
  }
  .logo-text{
    font-family:var(--font-heading);
    font-size:var(--h3);
    font-weight:600;
    color:var(--coral);
    letter-spacing:0.01em;
  }
  .back-link{
    font-family:var(--font-body); font-size:var(--p2); font-weight:500;
    color:var(--heading);
    transition:color 0.2s ease;
  }
  .back-link:hover{ color:var(--coral); }

  /* ---------- Case study header ---------- */
  .case-header{
    max-width:1280px; margin:0 auto;
    padding: 5rem 8vw 3rem;
  }
  .tag-row{ display:flex; align-items:center; gap:0.8rem; margin-bottom:1.4rem; }
  .tag{
    font-family:var(--font-body); font-size:var(--p3); text-transform:uppercase;
    letter-spacing:0.08em; padding:0.3rem 0.6rem; border-radius:3px;
    border:1px solid var(--coral); color:var(--coral);
  }
  .project-year{ font-family:var(--font-body); color:var(--text-faint); font-size:var(--p3); }
  .case-header h1{ font-size:clamp(2.2rem, 4.6vw, var(--h1)); max-width:20ch; }
  .skill-chips{ display:flex; flex-wrap:wrap; gap:0.5rem; margin-top:1.4rem; }
  .chip{
    font-family:var(--font-body); font-size:var(--p3); color:var(--body-text); background:var(--surface);
    border:1px solid var(--line); padding:0.3rem 0.7rem; border-radius:20px;
  }

  /* ---------- Gallery blocks ---------- */
  main.case-body{
    max-width:1280px; margin:0 auto; padding: 0 8vw 6rem;
    display:flex; flex-direction:column; gap:1.6rem;
  }

  .block{ padding:0; }

  .hero-shot{
    width:100%; border-radius:16px; overflow:hidden;
    border:1px solid var(--line);
    background:var(--surface-2);
  }
  .hero-shot img{ width:100%; height:auto; object-fit:cover; }

  footer{
    margin-top:0; padding: 3.5rem 8vw 3rem;
    display:flex; justify-content:space-between; align-items:flex-end;
    flex-wrap:wrap; gap:2rem;
    border-top:1px solid var(--line);
  }
  footer h2{ font-size:var(--h2); max-width:30ch; }
  footer .contact-links{ display:flex; flex-direction:column; align-items:flex-end; gap:1rem; font-family:var(--font-body); font-size:var(--p3); }
  footer .contact-email{ color:var(--coral); font-size:var(--p2); font-weight:500; }
  footer .contact-email:hover{ opacity:0.8; }
  .foot-note{
    max-width:1280px; margin:0 auto; padding: 0 8vw 3rem;
    font-family:var(--font-body); font-size:var(--p3); color:var(--text-faint);
  }
</style>
</head>
<body>

<div class="topnav">
  <a class="logo-text" href="index.html">Amruta J</a>
  <a class="back-link" href="index.html">← Back to portfolio</a>
</div>

<header class="case-header">
  <div class="tag-row">
    <span class="tag">Visual Design</span>
    <span class="project-year">2019</span>
  </div>
  <h1>Harman Kardon</h1>
  <div class="skill-chips">
    <span class="chip">Art Direction</span><span class="chip">Brand Identity</span><span class="chip">Visual Design</span>
  </div>
</header>

<main class="case-body">

  <div class="block">
    <div class="hero-shot">
      <img src="Harman-Kardon.png" alt="Harman Kardon brand campaign landing page">
    </div>
  </div>

</main>

<footer id="contact">
  <h2>From concept to creation,<br>let's make it happen</h2>
  <div class="contact-links">
    <a class="contact-email" href="mailto:amruta.inbox@gmail.com">amruta.inbox@gmail.com</a>
  </div>
</footer>
<div class="foot-note">© 2026 Amruta J — Brisbane, Australia</div>

</body>
</html>
